<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

.quiz-container{
    background:white;
    max-width:500px;
    margin:auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#e0e0e0;
}

button:hover{
    background:#cfcfcf;
    cursor:pointer;
}

#nextBtn{
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="quiz-container">

<h2 id="question">Frage</h2>

<div id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Nächste Frage</button>

<h3 id="score"></h3>

</div>

<script>

const quiz = [

{
question:"Welche Stadt ist die Hauptstadt von Kanada?",
answers:["Toronto","Ottawa","Montreal","Vancouver"],
correct:1
},

{
question:"Wie viele Spieler stehen beim Fußball pro Team auf dem Platz?",
answers:["9","10","11","12"],
correct:2
},

{
question:"Welches Element hat das chemische Symbol O?",
answers:["Gold","Osmium","Sauerstoff","Silber"],
correct:2
},

{
question:"Welcher Planet ist der Sonne am nächsten?",
answers:["Mars","Merkur","Venus","Jupiter"],
correct:1
},

{
question:"In welchem Land liegen die meisten Fjorde?",
answers:["Island","Schweden","Norwegen","Kanada"],
correct:2
}

];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

let q = quiz[currentQuestion];
document.getElementById("question").innerText = q.question;

let answersDiv = document.getElementById("answers");
answersDiv.innerHTML="";

q.answers.forEach((answer,index)=>{

let btn = document.createElement("button");
btn.innerText = answer;

btn.onclick = function(){

if(index === q.correct){
btn.style.background="lightgreen";
score++;
}
else{
btn.style.background="salmon";
}

document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);
document.getElementById("nextBtn").style.display="block";

}

answersDiv.appendChild(btn);

});

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < quiz.length){
loadQuestion();
document.getElementById("nextBtn").style.display="none";
}
else{
document.querySelector(".quiz-container").innerHTML =
"<h2>Quiz beendet!</h2><h3>Deine Punkte: "+score+" / "+quiz.length+"</h3>";
}

}

loadQuestion();

</script>

</body>
</html>
